<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Episode Player</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME: SHOWS -->
<div id="homeScreen">
    <h1>Select a Show</h1>
    <div id="showList"></div>
</div>

<!-- EPISODES -->
<div id="menu" style="display:none;">
    <h1 id="animeTitle"></h1>
    <div id="continueBox"></div>
    <div id="episodeList"></div>
</div>


<!-- PLAYER -->
<div id="playerScreen">
    <div class="controls">
        <button onclick="goHome()">Back</button>
        <div id="episodeTitle">Episode</div>
    </div>

    <video id="player" controls autoplay></video>

    <div id="nextCountdown"></div>
</div>

<script src="shows/JJK/JJK.js"></script>
<script src="script.js"></script>
<script src="loadCheck.js"></script>

</body>
</html>
