<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Episode Player</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="menu">
    <h1>My Show</h1>
    <div id="continueBox"></div>
    <div id="episodeList"></div>
</div>

<!-- PLAYER -->
<div id="playerScreen">
    <div class="controls">
        <button onclick="goHome()">Home</button>
        <div id="episodeTitle">Episode</div>
    </div>

    <video id="player" controls autoplay></video>

    <div id="nextCountdown"></div>
</div>

<script src="script.js"></script>
</body>
</html>
